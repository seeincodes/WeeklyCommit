# nginx config for the demo-deploy frontend image. Produces a SPA-style host:
# every URL falls back to /index.html so HashRouter (or a future BrowserRouter)
# resolves on first paint. Federation chunks under /assets/ get long-lived
# caching since their filenames are content-hashed by Vite.

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Aggressive caching for hashed asset bundles. Vite emits filenames like
    # `index-abc123.js` so any change in content produces a new filename.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # remoteEntry.js is the federation entry; manifest-style file that should
    # NOT be cached so a new deploy is picked up immediately.
    location = /assets/remoteEntry.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback. Everything that isn't a static file under /assets/
    # rewrites to /index.html so the in-browser router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check target for docker-compose `healthcheck:` blocks. Returns 200
    # without touching disk or the upstream; the SPA fallback would also work
    # but a static 200 is faster and cleaner in logs.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json application/wasm image/svg+xml;
}
