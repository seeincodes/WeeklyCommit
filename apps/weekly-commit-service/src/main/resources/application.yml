spring:
  application:
    name: weekly-commit-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns schema; see docs/ERROR_FIX_LOG.md
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  threads:
    virtual:
      enabled: true # Java 21; see docs/ERROR_FIX_LOG.md

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI}
          audiences:
            - ${AUTH0_AUDIENCE}

server:
  port: 8080
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
    git:
      mode: full
  metrics:
    tags:
      application: ${spring.application.name}
  cloudwatch:
    metrics:
      export:
        # Namespace under which Micrometer publishes to CloudWatch. Disabled by default
        # (step=PT0S) so dev/test runs don't try to push without AWS creds; prod sets a real
        # step (e.g. 60s) via env override.
        namespace: ${MICROMETER_CLOUDWATCH_NAMESPACE:WeeklyCommit}
        step: ${MICROMETER_CLOUDWATCH_STEP:PT0S}
        enabled: ${MICROMETER_CLOUDWATCH_ENABLED:false}
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Weekly Commit backend service
    version: '@project.version@'

# Resilience4j tuning per ADR-0002.
resilience4j:
  retry:
    instances:
      rcdo:
        maxAttempts: 3
        waitDuration: 200ms
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - org.springframework.web.reactive.function.client.WebClientResponseException$ServiceUnavailable
      notification:
        maxAttempts: ${RESILIENCE4J_NOTIFICATION_MAX_ATTEMPTS:3}
        waitDuration: ${RESILIENCE4J_NOTIFICATION_WAIT_MS:500}ms
        exponentialBackoffMultiplier: 2
  circuitbreaker:
    instances:
      rcdo:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      notification:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 30s # per ADR-0002
        permittedNumberOfCallsInHalfOpenState: 3

# WeeklyCommit-specific config (read by @ConfigurationProperties beans in group 5+).
weekly-commit:
  rcdo:
    base-url: ${RCDO_BASE_URL}
    timeout-ms: ${RCDO_TIMEOUT_MS:2000}
    service-token: ${RCDO_SERVICE_TOKEN:}
  notification:
    base-url: ${NOTIFICATION_SVC_BASE_URL}
    timeout-ms: ${NOTIFICATION_SVC_TIMEOUT_MS:3000}
    service-token: ${NOTIFICATION_SVC_SERVICE_TOKEN:}
  scheduled:
    auto-lock-cron: ${AUTO_LOCK_CRON:0 0 * * * *}
    archival-cron: ${ARCHIVAL_CRON:0 0 2 * * *}
    unreviewed-digest-cron: ${UNREVIEWED_DIGEST_CRON:0 0 9 * * MON}
    unreviewed-threshold-hours: ${UNREVIEWED_THRESHOLD_HOURS:72}
    archival-older-than-days: ${ARCHIVAL_OLDER_THAN_DAYS:90}
    auto-lock-cutoff-hours-after-week-start: ${AUTO_LOCK_CUTOFF_HOURS_AFTER_WEEK_START:36}
  audit:
    retention-days: ${AUDIT_RETENTION_DAYS:730}
  admin:
    replay-enabled: ${ADMIN_REPLAY_ENABLED:true}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.acme.weeklycommit: INFO
    org.springframework.security: INFO # toggle to DEBUG for JWT troubleshooting (ERROR_FIX_LOG.md)
