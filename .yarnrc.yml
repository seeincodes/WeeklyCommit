packageExtensions:
  # flowbite imports `tailwindcss` from its own context (flowbite/plugin.js)
  # but doesn't declare it as a peer/dependency. Without this extension,
  # Yarn PnP refuses the require call ("ambiguous and unsound") and the
  # tailwind config build fails on every Vite page load.
  flowbite@*:
    peerDependencies:
      tailwindcss: "*"
