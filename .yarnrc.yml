packageExtensions:
  # flowbite imports `tailwindcss` from its own context (flowbite/plugin.js)
  # but doesn't declare it as a peer/dependency. Without this extension,
  # Yarn PnP refuses the require call ("ambiguous and unsound") and the
  # tailwind config build fails on every Vite page load.
  flowbite@*:
    peerDependencies:
      tailwindcss: '*'
  # @testing-library/jest-dom@^6 ships an `/vitest` entry point that imports
  # from 'vitest', but jest-dom doesn't declare vitest as a peer/dep. Same
  # PnP "ambiguous and unsound" issue as flowbite/tailwind. Declaring the
  # peer here lets the /vitest entry resolve so vitest-aware matcher type
  # augmentation registers correctly.
  '@testing-library/jest-dom@*':
    peerDependencies:
      vitest: '*'
