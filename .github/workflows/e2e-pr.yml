name: e2e-pr

on:
  pull_request:
    paths:
      - 'apps/weekly-commit-ui/**'
      - 'apps/weekly-commit-service/**'
      - 'libs/**'
      - '.github/workflows/e2e-pr.yml'
  push:
    branches: [main]

concurrency:
  group: e2e-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress-cucumber:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Corepack must activate Yarn 4.5.0 BEFORE actions/setup-node runs:
      # setup-node's `cache: yarn` invokes `yarn` to discover the lockfile, and
      # the runner's preinstalled Yarn 1.22.22 fails the `packageManager` gate
      # in package.json. Enabling corepack first shims `yarn` to 4.5.0 globally.
      - name: Enable Corepack + pin Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.5.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install JS deps
        run: yarn install --immutable

      # ---------------------------------------------------------------------------
      # Build the backend JAR. -DskipTests keeps the workflow single-purpose:
      # backend-pr.yml runs the full backend test matrix, this job only needs the
      # runnable artifact for the docker-compose harness.
      #
      # The JAR lands at target/weekly-commit-service.jar (stable name fixed via
      # <finalName> in pom.xml), which is what docker-compose.e2e.yml mounts.
      # ---------------------------------------------------------------------------
      - name: Build backend JAR for the E2E stack
        working-directory: apps/weekly-commit-service
        run: ./mvnw -B -DskipTests package

      # ---------------------------------------------------------------------------
      # Bring up the ephemeral stack (postgres + the backend JAR via temurin:21-jre).
      # See apps/weekly-commit-ui/docker-compose.e2e.yml for the full design notes.
      # SPRING_PROFILES_ACTIVE=e2e activates E2eJwtDecoderConfig so the test JWTs
      # the Cypress cy.loginAs(role) helper signs are trusted.
      # ---------------------------------------------------------------------------
      - name: Provision ephemeral env (docker compose up)
        working-directory: apps/weekly-commit-ui
        run: docker compose -f docker-compose.e2e.yml up -d --wait

      - name: Show backend logs on failure
        if: failure()
        working-directory: apps/weekly-commit-ui
        run: docker compose -f docker-compose.e2e.yml logs --no-color weekly-commit-service

      # ---------------------------------------------------------------------------
      # Start the Vite dev server in the background. Cypress's baseUrl points at
      # http://localhost:4184 (matching vite.config.ts strictPort). The server
      # process keeps running until the runner shuts down -- no explicit teardown
      # because GitHub Actions cleans up the runner.
      # ---------------------------------------------------------------------------
      - name: Start Vite dev server
        working-directory: apps/weekly-commit-ui
        env:
          VITE_API_BASE_URL: http://localhost:8080
        run: yarn dev > /tmp/vite-dev.log 2>&1 &

      - name: Wait for Vite dev server to be reachable
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:4184 > /dev/null; then
              echo "Vite dev server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Vite dev server did not come up; tail of log:"
          tail -50 /tmp/vite-dev.log || true
          exit 1

      # ---------------------------------------------------------------------------
      # Cypress run. Default cypress.config.ts env.TAGS is `not @pending` -- the
      # four scenario .feature files (commit-entry, lock-week, reconcile,
      # manager-review) and the kill-switch contract scenarios are all @pending
      # until group 13b lands the WeekEditor mode-pane integration. Today this
      # job exercises only the smoke .feature against the real ephemeral stack;
      # group 13b will flip those scenarios on.
      # ---------------------------------------------------------------------------
      - name: Cypress + Cucumber
        working-directory: apps/weekly-commit-ui
        run: yarn test:cypress

      - name: Upload cypress artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            apps/weekly-commit-ui/cypress/screenshots
            apps/weekly-commit-ui/cypress/videos
          if-no-files-found: ignore

      - name: Tear down ephemeral env
        if: always()
        working-directory: apps/weekly-commit-ui
        run: docker compose -f docker-compose.e2e.yml down -v
